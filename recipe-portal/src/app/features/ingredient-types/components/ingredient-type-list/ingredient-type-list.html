<div class="card">
  <div class="text-right">
    <p-button label="Add" icon="pi pi-plus" (click)="selectedTypeId = null; isShowDetail = true" />
  </div>
  <div class="pt-2">
    <p-table [value]="types" [paginator]="true" [rows]="10">
      <ng-template pTemplate="header">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Description</th>
          <th>Status</th>
          <th style="width:220px">Actions</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-type>
        <tr>
          <td>{{ type.id }}</td>
          <td>{{ type.name }}</td>
          <td>{{ type.description }}</td>
          <td>
            <p-tag [severity]="type.isActive ? 'success' : 'danger'" [value]="type.isActive ? 'Active' : 'Inactive'" />
          </td>
          <td>
            <p-button type="button" icon="pi pi-pencil" [rounded]="true" [text]="true"
                      (click)="selectedTypeId = type.id; isShowDetail = true" pTooltip="Edit"></p-button>
            <p-button type="button" [icon]="type.isActive ? 'pi pi-times' : 'pi pi-check'" [rounded]="true" [text]="true"
                      [severity]="type.isActive ? 'danger' : 'success'" (click)="updateStatus(type)"
                      [pTooltip]="type.isActive ? 'Deactivate' : 'Activate'"></p-button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="4">No data available</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<app-side-drawer [visible]="isShowDetail" (close)="isShowDetail = false" [title]="selectedTypeId ? 'Detail' : 'Add'"
                 (save)="ingredientTypeDetail.save()">
  <app-ingredient-type-detail #ingredientTypeDetail [id]="selectedTypeId"
                              (onSaved)="isShowDetail = false; getAllTypes()"></app-ingredient-type-detail>
</app-side-drawer>
