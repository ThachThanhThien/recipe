<form [formGroup]="form" class="flex flex-col gap-4 w-full">
  <app-multilingual-input 
    formControlName="name" 
    label="Name" 
    [required]="true"
  ></app-multilingual-input>

  <div class="flex flex-col gap-2">
    <label for="typeIds" class="required-field">Ingredient Type</label>
    <p-multiSelect [options]="types" optionLabel="displayName" optionValue="id" formControlName="typeIds"
      placeholder="Please select" [fluid]="true" [invalid]="isInvalid(form, 'typeIds')"></p-multiSelect>
    @if (isInvalid(form, 'typeIds')) {
    <p-message severity="error" size="small" variant="simple">Ingredient type is required.</p-message>
    }
  </div>

  <div class="flex flex-col gap-2">
    <label for="unit">Unit</label>
    <input id="unit" pInputText formControlName="unit" placeholder="e.g. gram, ml, piece" />
  </div>

  <app-multilingual-input 
    formControlName="description" 
    label="Description" 
    type="textarea"
  ></app-multilingual-input>

</form>
