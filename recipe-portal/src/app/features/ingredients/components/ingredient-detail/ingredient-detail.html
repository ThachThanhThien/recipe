<form [formGroup]="form" class="flex flex-col gap-4 w-full">
  <div class="flex flex-col gap-2">
    <label for="name" class="required-field">Name</label>
    <input id="name" pInputText formControlName="name" [invalid]="isInvalid(form, 'name')" />

    @if (isInvalid(form, 'name')) {
      <p-message severity="error" size="small" variant="simple">
        Name is required
      </p-message>
    }
  </div>
  
  <div class="flex flex-col gap-2">
    <label for="typeId" class="required-field">Ingredient Type</label>
    <p-select [options]="types" optionLabel="name" optionValue="id" formControlName="typeId" placeholder="Please select"
      [fluid]="true" [invalid]="isInvalid(form, 'typeId')"></p-select>
    @if (isInvalid(form, 'typeId')) {
      <p-message severity="error" size="small" variant="simple">Ingredient type is required.</p-message>
    }
  </div>

  <div class="flex flex-col gap-2">
    <label for="description">Description</label>
    <textarea id="description" rows="4" pTextarea formControlName="description">
    </textarea>
  </div>
</form>
