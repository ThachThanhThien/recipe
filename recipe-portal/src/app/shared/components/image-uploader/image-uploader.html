<div class="flex flex-col gap-2">
  @if (label) {
    <label class="text-sm font-medium">{{ label }}</label>
  }

  <div
    class="relative border-2 border-dashed rounded-lg p-4 cursor-pointer transition-colors"
    [class.border-primary-500]="isDragging"
    [class.bg-primary-50]="isDragging"
    [class.border-surface-300]="!isDragging"
    [class.opacity-60]="disabled || isUploading"
    [class.cursor-not-allowed]="disabled || isUploading"
    (click)="openPicker()"
    (dragover)="onDragOver($event)"
    (dragleave)="onDragLeave($event)"
    (drop)="onDrop($event)"
    role="button"
    tabindex="0"
    (keydown.enter)="openPicker()"
    (keydown.space)="openPicker(); $event.preventDefault()"
  >
    <input
      #fileInput
      type="file"
      class="hidden"
      accept="image/jpeg,image/png,image/webp"
      (change)="onFileSelected($event)"
    />

    @if (previewUrl) {
      <div class="flex items-center gap-4">
        <div class="relative w-32 h-32 rounded-md overflow-hidden bg-surface-100 flex-shrink-0">
          <img [src]="previewUrl" alt="Preview" class="w-full h-full object-cover" />
        </div>
        <div class="flex-1 flex flex-col gap-2 min-w-0">
          @if (isUploading) {
            <p-progressbar [value]="progress" [showValue]="true"></p-progressbar>
            <span class="text-xs text-surface-600">Uploading… {{ progress }}%</span>
          } @else {
            <span class="text-xs text-surface-600 truncate">{{ value }}</span>
            <div class="flex gap-2">
              <p-button
                type="button"
                label="Replace"
                icon="pi pi-refresh"
                size="small"
                [text]="true"
                (click)="$event.stopPropagation(); openPicker()"
                [disabled]="disabled"
              ></p-button>
              <p-button
                type="button"
                label="Remove"
                icon="pi pi-trash"
                size="small"
                severity="danger"
                [text]="true"
                (click)="clear($event)"
                [disabled]="disabled"
              ></p-button>
            </div>
          }
        </div>
      </div>
    } @else {
      <div class="flex flex-col items-center justify-center gap-2 py-6 text-surface-600">
        <i class="pi pi-cloud-upload text-3xl"></i>
        <span class="text-sm">{{ placeholderText }}</span>
        <span class="text-xs text-surface-500">JPEG, PNG, or WebP — up to 5 MB</span>
      </div>
    }
  </div>

  @if (errorMessage) {
    <p-message severity="error" size="small" variant="simple">{{ errorMessage }}</p-message>
  }
</div>
