<p-drawer [visible]="visible" [position]="position" (onHide)="handleOnHide()"
          styleClass="!w-full md:!w-80 lg:!w-[55rem]">
  <ng-template #headless>
    <div class="flex flex-col h-full">
      <div class="flex items-center justify-between p-3">
        <div>
          <strong class="mr-10 h-fit text-2xl">{{ title }}</strong>
          <p-button type="button" label="Save" icon="pi pi-save" (click)="onSave()"></p-button>
        </div>
        <div>
          <p-button type="button" icon="pi pi-times" [rounded]="true" [text]="true" (click)="onClose()"></p-button>
        </div>
      </div>
      <div class="p-3">
        <ng-content></ng-content>
      </div>
    </div>
  </ng-template>
</p-drawer>
